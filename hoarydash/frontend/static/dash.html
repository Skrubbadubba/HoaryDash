<script>
(function() {
  var RECONNECT_DELAY_MS = 5000;
  var entityIds = window.CONFIG.entity_ids;
  var msgId = 1;

  window.entityState = {};

  function processEntities(entities) {
    var entityId, entity;
    for (entityId in entities) {
        if (!entities.hasOwnProperty(entityId)) { continue; }
        entity = entities[entityId];

        if (!window.entityState[entityId]) {
            window.entityState[entityId] = {};
        }

        fields = entity['+'] !== undefined ? entity['+'] : entity;

        if (fields.s !== undefined) {
            window.entityState[entityId].s = fields.s;
        }
        if (fields.a !== undefined) {
            window.entityState[entityId].a = fields.a;
    }

      document.dispatchEvent(new CustomEvent('ha-state-change', {
        detail: {
          entity_id: entityId,
          state: window.entityState[entityId].s,
          attributes: window.entityState[entityId].a
        }
      }));
    }
  }

  function connect() {
    var ws = new WebSocket(
      (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/api/ws'
    );

    ws.onopen = function() {
      ws.send(JSON.stringify({
        id: msgId,
        type: 'subscribe_entities',
        entity_ids: entityIds
      }));
    };

    ws.onmessage = function(evt) {
      var msg;
      try { msg = JSON.parse(evt.data); } catch(e) { return; }
      console.log("Message from server ", msg);

      if (msg.type !== 'event' || msg.id !== msgId) { return; }

      var ev = msg.event;

      if (ev.a) { processEntities(ev.a); }

      if (ev.c) { processEntities(ev.c); }
    };

    ws.onclose = function() { setTimeout(connect, RECONNECT_DELAY_MS); };
    ws.onerror = function() { ws.close(); };
  }

  connect();
})();
</script>

<script>
    var locale = 'sv-SE' || navigator.language || 'en-US';
    var timezone = '' || Intl.DateTimeFormat().resolvedOptions().timeZone;
    var hour12 = false;
    function updateTime() {
        var now = new Date();

        var time = now.toLocaleTimeString(locale, {
            hour: '2-digit',
            minute: '2-digit',
            hour12: hour12,
            timeZone: timezone
        });

        var day = now.toLocaleDateString(locale, {
            weekday: 'long',
            timeZone: timezone
        });

        var date = now.toLocaleDateString(locale, {
            dateStyle: 'short',
            timeZone: timezone
        });
        
        day = day.charAt(0).toUpperCase() + day.slice(1);
        
        var date = now.toLocaleDateString(locale);

        document.getElementById('clock').textContent = time;
        document.getElementById('date').textContent = day + ', ' + date;
    }

    
    function toggleClockMargin() {
        var el = document.getElementById('clock');
        el.style.marginBottom = (el.style.marginBottom === '4rem') ? '0rem' : '4rem';
    }

    setInterval(updateTime, 1000);
    setInterval(toggleClockMargin, 5 * 60 * 1000);
    updateTime();
</script>

    <svg fill="#000000" viewBox="-2 -1 24 24" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMin" class="jam jam-candle"><path d="M9 11v6h2v-6H9zm4 6h5a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-1a2 2 0 0 1 2-2h5V9h6v8zM2 19v1h16v-1H2zm8-10.6a3 3 0 0 1-3-3C7 4.295 8 2.495 10 0c2 2.495 3 4.295 3 5.4a3 3 0 0 1-3 3zm0-1.952c.552 0 1-.48 1-1 0-.466-.333-1.109-1-2-.667.891-1 1.534-1 2 0 .52.448 1 1 1z"></path></svg>

<script>
    var nightlightActive = false;
    var btn = document.getElementById('nightlight-btn');
    var panel = document.getElementById('brightness-panel');
    var overlay = document.getElementById('nightlight-overlay');
    var sliderContainer = document.getElementById('custom-slider');
    var sliderFill = document.getElementById('slider-fill');
    var sliderThumb = document.getElementById('slider-thumb');
    var isDragging = false;
    var currentBrightness = 80;

    function renderSlider(val) {
        sliderFill.style.height = val + '%';
        sliderThumb.style.bottom = val + '%';
    }
    renderSlider(currentBrightness);

    btn.addEventListener('click', function() {
        nightlightActive = !nightlightActive;
        if (nightlightActive) {
            document.body.className = 'nightlight';
            btn.classList.add('active');
            panel.className = 'visible';
            applyBrightness(currentBrightness);
        } else {
            document.body.className = '';
            btn.classList.remove('active');
            panel.className = '';
            overlay.style.opacity = '0';
        }
    });

    function applyBrightness(val) {
        var dimAmount = (100 - val) / 100 * 0.92;
        overlay.style.opacity = dimAmount;
    }

    function handleDrag(clientY) {
        var rect = sliderContainer.getBoundingClientRect();
        var yOffset = rect.bottom - clientY;
        var percentage = (yOffset / rect.height) * 100;
        percentage = Math.max(0, Math.min(100, percentage));
        currentBrightness = percentage;
        renderSlider(currentBrightness);
        if (nightlightActive) applyBrightness(currentBrightness);
    }

    sliderContainer.addEventListener('mousedown', function(e) { isDragging = true; handleDrag(e.clientY); });
    document.addEventListener('mousemove', function(e) { if (isDragging) handleDrag(e.clientY); });
    document.addEventListener('mouseup', function() { isDragging = false; });
    sliderContainer.addEventListener('touchstart', function(e) { isDragging = true; handleDrag(e.touches[0].clientY); e.preventDefault(); }, false);
    document.addEventListener('touchmove', function(e) { if (isDragging) { handleDrag(e.touches[0].clientY); e.preventDefault(); } }, false);
    document.addEventListener('touchend', function() { isDragging = false; }, false);
</script>
