dashboards:
  dash:
    nightlight:
      enabled: true
      override_colors: true
    sensors:
      - entity_id: sensor.living_room_temperature # Or whatever you have
        label: Temperature
        unit: °C
    entities:
      - entity_id: button.doorbell
        label: Ring doorbell
        icon: 🔔
      - entity_id: light.ceiling
        label: Ceiling light
        icon: 💡
    theme:
      background_gradient: "linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%)"
      font_color: "#e0f7fa"
      secondary_font_color: "#80cbc4"
      icon_color: "#4dd0e1"
      entities:
        borders: true
        border_color: "rgba(255, 255, 255, 0.12)"
        background: "rgba(255, 255, 255, 0.08)"
      sensors:
        borders: true
        border_color: "rgba(255, 255, 255, 0.12)"
        background: "rgba(255, 255, 255, 0.05)"
      base_font_size: 20
  screensaver:
    nightlight:
      enabled: false
    sensors:
      - entity_id: sensor.living_room_temperature
        label: Temperature
        unit: °C

localization:
  locale: "en-US"
  timezone: "America/New_York"
  hour12: false # Or true I guess if your weird

fully_kiosk:
  screensaver_timeout: 60

home_assistant:
  url: "http://homeassistant.local:8123"
  token: "your_long_lived_token_here"