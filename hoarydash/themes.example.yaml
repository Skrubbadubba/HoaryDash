  background_gradient: "linear-gradient(160deg, #0d0d0d 0%, #1a0a00 40%, #2d0a00 100%)"
  button_background: "rgba(255, 100, 30, 0.15)"
  card_background: "rgba(255, 80, 20, 0.08)"
  font_color: "#fff3e0"
  secondary_font_color: "#ffab76"
  icon_color: "#ff7043"

