# ─── NORD ────────────────────────────────────────────────────────────────────
# Polar night: #2e3440 #3b4252 #434c5e #4c566a
# Snow storm:  #d8dee9 #e5e9f0 #eceff4
# Frost:       #8fbcbb #88c0d0 #81a1c1 #5e81ac
theme:
  body_background: "#2e3440"
  font_color: "#eceff4"
  secondary_font_color: "#9099aa"
  icon_color: "#88c0d0"
  cards:
    borders: true
    border_color: "#434c5e"
