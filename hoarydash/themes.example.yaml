# ─── AURORA GRADIENT ─────────────────────────────────────────────────────────
theme:
  background_gradient: "linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%)"
  font_color: "#e0f7fa"
  secondary_font_color: "#80cbc4"
  icon_color: "#4dd0e1"
  cards:
    borders: true
    border_color: "rgba(255, 255, 255, 0.12)"
    background: "rgba(255, 255, 255, 0.08)"
  widgets:
    borders: false
    background: "rgba(0, 0, 0, 0)"
  sensors:
    borders: false
    background: "rgba(0, 0, 0, 0)"

# ─── SUNSET GRADIENT ─────────────────────────────────────────────────────────
theme:
  background_gradient: "linear-gradient(160deg, #0d0d0d 0%, #1a0a00 40%, #2d0a00 100%)"
  font_color: "#fff3e0"
  secondary_font_color: "#ffab76"
  icon_color: "#ff7043"
  cards:
    borders: true
    border_color: "rgba(255, 100, 30, 0.25)"
    background: "rgba(255, 100, 30, 0.15)"
  widgets:
    borders: false
    background: "rgba(0, 0, 0, 0)"
  sensors:
    borders: false
    background: "rgba(0, 0, 0, 0)"

