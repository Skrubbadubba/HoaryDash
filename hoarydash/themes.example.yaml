# ─── AURORA GRADIENT ─────────────────────────────────────────────────────────
theme:
  background_gradient: "linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%)"
  button_background: "rgba(255, 255, 255, 0.08)"
  card_background: "rgba(255, 255, 255, 0.05)"
  font_color: "#e0f7fa"
  secondary_font_color: "#80cbc4"
  icon_color: "#4dd0e1"

