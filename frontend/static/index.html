<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: "Outfit", sans-serif;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-align-items: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-transition: background-color 0.8s ease;
            transition: background-color 0.8s ease;
        }

        body.nightlight {
            background-color: hsl(22, 100%, 50%);
        }

        body.nightlight .clock,
        body.nightlight .date {
            color: hsla(22, 100%, 35%, 0.5);
        }

        .clock {
            font-size: 15vw;
            font-weight: 600;
            margin-bottom: 0rem;
            -webkit-transition: color 0.8s ease, margin-bottom 0.5s ease;
            transition: color 0.8s ease, margin-bottom 0.5s ease;
            letter-spacing: -0.02em;
        }

        .date {
            font-size: 4vw;
            font-weight: 600;
            -webkit-transition: color 0.8s ease;
            transition: color 0.8s ease;
        }

        /* ─── Nightlight Button ─── */
        #nightlight-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 52px;
            height: 52px;
            background-color: #cc2200;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            -webkit-transition: background-color 0.3s ease, -webkit-transform 0.15s ease, box-shadow 0.3s ease;
            transition: background-color 0.3s ease, transform 0.15s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 0px rgba(255, 80, 0, 0);
            outline: none;
            /* flame/moon icon via SVG inline */
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
        }

        #nightlight-btn svg {
            width: 26px;
            height: 26px;
            fill: rgba(255,255,255,0.85);
            -webkit-transition: fill 0.3s ease;
            transition: fill 0.3s ease;
        }

        #nightlight-btn:active {
            -webkit-transform: scale(0.88);
            transform: scale(0.88);
        }

        #nightlight-btn.active {
            background-color: #333;
            box-shadow: 0 0 24px rgba(255, 100, 0, 0.5);
        }

        #nightlight-btn.active svg {
            fill: #ff9944;
        }

        /* ─── Brightness Slider Panel ─── */
        #brightness-panel {
            position: fixed;
            bottom: 90px;
            right: 24px;
            width: 52px;
            background-color: rgba(30,30,30,0.9);
            border-radius: 26px;
            padding: 16px 0;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-align-items: center;
            align-items: center;
            /* hidden by default */
            opacity: 0;
            pointer-events: none;
            -webkit-transform: translateY(12px);
            transform: translateY(12px);
            -webkit-transition: opacity 0.4s ease, -webkit-transform 0.4s ease;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #brightness-panel.visible {
            opacity: 1;
            pointer-events: all;
            -webkit-transform: translateY(0);
            transform: translateY(0);
        }


        /* ─── Custom Vertical Slider ─── */
        #custom-slider {
            position: relative;
            width: 20px;
            height: 140px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            /* Prevent touch actions like scrolling from hijacking the drag */
            touch-action: none; 
        }

        #slider-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80%; /* Will be overridden by JS */
            background-color: #ff6600;
            border-radius: 10px;
            pointer-events: none;
        }

        #slider-thumb {
            position: absolute;
            bottom: 80%; /* Will be overridden by JS */
            left: 50%;
            -webkit-transform: translate(-50%, 50%);
            transform: translate(-50%, 50%);
            width: 32px;
            height: 32px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            pointer-events: none; /* Let the container capture the events */
        }

        #brightness-label {
            font-family: "Outfit", sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            margin-top: 18px;
            letter-spacing: 0.05em;
        }

        /* ─── Nightlight overlay for brightness control ─── */
        #nightlight-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000000;
            pointer-events: none;
            opacity: 0;
            -webkit-transition: opacity 0.1s linear;
            transition: opacity 0.1s linear;
        }

        /* ─── Weather widget (top-right, from original) ─── */
        .wlr {
            position: absolute;
            top: 15px;
            right: 20px;
            font-family: "Outfit", sans-serif;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Weather block -->
    <!-- <div id="id1c055f8167e7f" a='{"t":"r","v":"1.2","lang":"sv","locs":[865],"ssot":"c","sics":"ms","cbkg":"#000000","cfnt":"#FFFFFF","codd":"#000000","cont":"#E0E0E0","stof":"3","sfnt":"a"}'>Weather Data Source: <a href="https://sharpweather.com/weather_linkoping/30_days/">weather forecast Linkoping 30 days</a></div>
    <script async src="https://static1.sharpweather.com/widgetjs/?id=id1c055f8167e7f"></script> -->

    <!-- Clock & Date -->
    <div class="clock" id="clock"></div>
    <div class="date" id="date"></div>

    <!-- Darkness overlay (for brightness dimming) -->
    <div id="nightlight-overlay"></div>

    <!-- Brightness slider panel (shown in nightlight mode) -->
    <div id="brightness-panel">
        <div id="custom-slider">
            <div id="slider-fill"></div>
            <div id="slider-thumb"></div>
        </div>
    </div>


    <!-- Nightlight toggle button -->
    <button id="nightlight-btn" title="Nightlight">
        <!-- Candle / flame icon -->
        <svg fill="#000000" viewBox="-2 -1 24 24" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMin" class="jam jam-candle"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><path d="M9 11v6h2v-6H9zm4 6h5a2 2 0 0 1 2 2v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-1a2 2 0 0 1 2-2h5V9h6v8zM2 19v1h16v-1H2zm8-10.6a3 3 0 0 1-3-3C7 4.295 8 2.495 10 0c2 2.495 3 4.295 3 5.4a3 3 0 0 1-3 3zm0-1.952c.552 0 1-.48 1-1 0-.466-.333-1.109-1-2-.667.891-1 1.534-1 2 0 .52.448 1 1 1z"></path></g></svg>
    </button>

    <script>
        fetch("/api").then(response => {
            response.json().then(res => alert(JSON.stringify(res)))
            <!-- response.json().then(res => console.log(JSON.stringify(res))) -->
        })
        // ─── Clock ───────────────────────────────────────────
        function updateTime() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = now.getMinutes();

            var days = ['Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag', 'Söndag'];
            // Note: getDay() returns 0=Sunday. Remap for Swedish Monday-first:
            var dayIndex = now.getDay(); // 0=Sun,1=Mon...6=Sat
            var swedishIndex = (dayIndex + 6) % 7; // 0=Mon...6=Sun
            var day = days[swedishIndex];

            var date = now.toLocaleDateString('de-DE');

            var hStr = hours < 10 ? '0' + hours : '' + hours;
            var mStr = minutes < 10 ? '0' + minutes : '' + minutes;

            document.getElementById('clock').innerHTML = hStr + ':' + mStr;
            document.getElementById('date').innerHTML = day + ', ' + date;
        }

        // Margin toggle (screensaver burn-in prevention)
        function toggleClockMargin() {
            var el = document.getElementById('clock');
            el.style.marginBottom = (el.style.marginBottom === '4rem') ? '0rem' : '4rem';
        }

        setInterval(updateTime, 1000);
        setInterval(toggleClockMargin, 5 * 60 * 1000);
        updateTime();


        // ─── Nightlight & Custom Slider ────────────────────────
        var nightlightActive = false;
        var btn = document.getElementById('nightlight-btn');
        var panel = document.getElementById('brightness-panel');
        var overlay = document.getElementById('nightlight-overlay');
        
        var sliderContainer = document.getElementById('custom-slider');
        var sliderFill = document.getElementById('slider-fill');
        var sliderThumb = document.getElementById('slider-thumb');
        
        var isDragging = false;
        var currentBrightness = 80; // 0 to 100

        // Initialize Slider Visuals
        function renderSlider(val) {
            sliderFill.style.height = val + '%';
            sliderThumb.style.bottom = val + '%';
        }
        renderSlider(currentBrightness);

        btn.addEventListener('click', function() {
            nightlightActive = !nightlightActive;

            if (nightlightActive) {
                document.body.className = 'nightlight';
                btn.className = 'active';
                panel.className = 'visible';
                applyBrightness(currentBrightness);
            } else {
                document.body.className = '';
                btn.className = '';
                panel.className = '';
                overlay.style.opacity = '0';
            }
        });

        function applyBrightness(val) {
            // val: 0-100, where 100 = full orange (no dimming), 0 = almost black
            // We darken by increasing overlay opacity
            var dimAmount = (100 - val) / 100 * 0.92; // max dim ~92%
            overlay.style.opacity = dimAmount;
        }

        // Logic for converting touch/mouse Y position to percentage
        function handleDrag(clientY) {
            var rect = sliderContainer.getBoundingClientRect();
            // Calculate distance from bottom
            var yOffset = rect.bottom - clientY;
            var height = rect.height;
            
            var percentage = (yOffset / height) * 100;
            // Clamp between 0 and 100
            percentage = Math.max(0, Math.min(100, percentage));
            
            currentBrightness = percentage;
            renderSlider(currentBrightness);
            
            if (nightlightActive) {
                applyBrightness(currentBrightness);
            }
        }


        // Also allow tapping anywhere on the body (not the button/panel) to dismiss
        document.body.addEventListener('click', function(e) {
            if (nightlightActive && e.target === document.body) {
                // Don't dismiss on body tap — user may want nightlight for a while
                // Could add dismiss logic here if desired
            }
        });

         // --- Mouse Events (For PC testing) ---
        sliderContainer.addEventListener('mousedown', function(e) {
            isDragging = true;
            handleDrag(e.clientY);
        });

        document.addEventListener('mousemove', function(e) {
            if (isDragging) {
                handleDrag(e.clientY);
            }
        });

        document.addEventListener('mouseup', function() {
            isDragging = false;
        });

         // --- Touch Events (For the Tablet) ---
        sliderContainer.addEventListener('touchstart', function(e) {
            isDragging = true;
            handleDrag(e.touches[0].clientY);
            // Prevent zooming/scrolling on older tablets while sliding
            e.preventDefault(); 
        }, false);

        document.addEventListener('touchmove', function(e) {
            if (isDragging) {
                handleDrag(e.touches[0].clientY);
                e.preventDefault(); 
            }
        }, false);

        document.addEventListener('touchend', function() {
            isDragging = false;
        }, false);

        
    </script>
</body>
</html>
